<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>OG Image Generator</title>
  <style>
    * { margin: 0; padding: 0; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
    }
    .container {
      width: 1200px;
      height: 630px;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
    }
    .logo {
      width: 280px;
    }
    .tagline {
      font-family: -apple-system, sans-serif;
      font-size: 24px;
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: -0.3px;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="/ReadySet_logo_darkmode_white.png" class="logo" alt="ReadySet" />
    <p class="tagline">예측 분석 기반 미디어 플래닝 통합 플랫폼</p>
  </div>
</body>
</html>
