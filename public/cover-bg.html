<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ReadySet Cover Background</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 100vw;
      height: 100vh;
      background: linear-gradient(135deg, 
        hsl(210, 30%, 96%) 0%, 
        hsl(45, 25%, 95%) 20%, 
        hsl(200, 35%, 94%) 40%, 
        hsl(120, 20%, 95%) 60%, 
        hsl(340, 25%, 96%) 80%, 
        hsl(220, 30%, 97%) 100%);
    }

    /* 다크모드: URL에 ?dark 붙이면 적용 */
    body.dark {
      background: linear-gradient(135deg, 
        hsl(220, 15%, 4%) 0%, 
        hsl(45, 10%, 4.5%) 20%, 
        hsl(200, 18%, 4%) 40%, 
        hsl(120, 12%, 4.2%) 60%, 
        hsl(340, 15%, 4.5%) 80%, 
        hsl(240, 15%, 5%) 100%);
    }
  </style>
</head>
<body>
  <script>
    if (window.location.search.includes('dark')) {
      document.body.classList.add('dark');
    }
  </script>
</body>
</html>
