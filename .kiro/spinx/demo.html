<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SpinX Square Symbol Animation Demo</title>
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background-color: #fff;
      background-image:
        linear-gradient(45deg, #eef1f4 25%, transparent 25%),
        linear-gradient(-45deg, #eef1f4 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #eef1f4 75%),
        linear-gradient(-45deg, transparent 75%, #eef1f4 75%);
      background-size: 24px 24px;
      background-position: 0 0, 0 12px, 12px -12px, -12px 0px;
      color: #121417;
    }
    .card {
      padding: 36px 42px;
      border-radius: 28px;
      background: rgba(255,255,255,.78);
      box-shadow: 0 24px 80px rgba(15, 23, 42, .16);
      text-align: center;
    }
    img { display: block; width: 192px; height: 192px; margin: 0 auto 18px; }
    p { margin: 0; color: #59616b; font-size: 14px; }
  </style>
</head>
<body>
  <main class="card">
    <img src="./spinx-square-symbol-animated.svg" alt="SpinX square symbol animation" />
    <p>Transparent animated SVG · no background tile</p>
  </main>
</body>
</html>
