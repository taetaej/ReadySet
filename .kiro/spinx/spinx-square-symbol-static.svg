<svg class="spinx-symbol" data-motion="static" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="spinx-symbol-title">
  <title id="spinx-symbol-title">SpinX static square symbol</title>
  <style><![CDATA[
/* SpinX square symbol animation system
   - Asset background is transparent by design. Do not add <rect> in the SVG.
   - Works best when the SVG is inline, embedded as React JSX, or opened as the standalone animated SVG.
*/

.spinx-symbol {
  --spinx-duration: 8s;
  --spinx-engage-duration: 1.15s;
  --spinx-settle-duration: 1.4s;
  --spinx-core-duration: 2.4s;
  --spinx-cyan: #28eaff;
  --spinx-cyan-soft: #a6fbff;
  --spinx-metal: #e9f3f6;
  --spinx-graphite: #122126;

  display: inline-block;
  overflow: visible;
  vertical-align: middle;
  color: var(--spinx-cyan);
  isolation: isolate;
}

.spinx-symbol__orbit-spin,
.spinx-symbol__core,
.spinx-symbol__ring-flow {
  transform-box: view-box;
  transform-origin: 256px 256px;
  will-change: transform, opacity, filter;
}

.spinx-symbol__ring-flow {
  stroke-dasharray: 38 318;
  stroke-dashoffset: 0;
}

/* IDLE: mostly aligned to the X. Small gyroscopic breathing only. */
.spinx-symbol[data-motion='idle'] .spinx-symbol__orbit-spin--outer {
  animation: spinx-idle-outer var(--spinx-duration) ease-in-out infinite;
}

.spinx-symbol[data-motion='idle'] .spinx-symbol__orbit-spin--inner {
  animation: spinx-idle-inner var(--spinx-duration) ease-in-out infinite;
}

.spinx-symbol[data-motion='idle'] .spinx-symbol__core {
  animation: spinx-core-pulse var(--spinx-core-duration) ease-in-out infinite;
}

/* HOVER: idle until the parent SVG is hovered. */
.spinx-symbol[data-motion='hover'] .spinx-symbol__orbit-spin--outer {
  animation: spinx-idle-outer var(--spinx-duration) ease-in-out infinite;
}

.spinx-symbol[data-motion='hover'] .spinx-symbol__orbit-spin--inner {
  animation: spinx-idle-inner var(--spinx-duration) ease-in-out infinite;
}

.spinx-symbol[data-motion='hover']:hover .spinx-symbol__orbit-spin--outer {
  animation: spinx-ring-cw var(--spinx-duration) linear infinite;
}

.spinx-symbol[data-motion='hover']:hover .spinx-symbol__orbit-spin--inner {
  animation: spinx-ring-ccw var(--spinx-duration) linear infinite;
}

.spinx-symbol[data-motion='hover']:hover .spinx-symbol__ring-flow {
  animation: spinx-flow 1.6s linear infinite;
}

.spinx-symbol[data-motion='hover']:hover .spinx-symbol__core {
  animation: spinx-core-pulse 1.2s ease-in-out infinite;
}

/* ACTIVE: continuous counter-rotating gyroscopic motion. */
.spinx-symbol[data-motion='active'] .spinx-symbol__orbit-spin--outer {
  animation: spinx-ring-cw var(--spinx-duration) linear infinite;
}

.spinx-symbol[data-motion='active'] .spinx-symbol__orbit-spin--inner {
  animation: spinx-ring-ccw var(--spinx-duration) linear infinite;
}

.spinx-symbol[data-motion='active'] .spinx-symbol__ring-flow {
  animation: spinx-flow 1.55s linear infinite;
}

.spinx-symbol[data-motion='active'] .spinx-symbol__core {
  animation: spinx-core-pulse 1.35s ease-in-out infinite;
}

/* ENGAGE: short activation burst. Useful on click/open. */
.spinx-symbol[data-motion='engage'] .spinx-symbol__orbit-spin--outer {
  animation: spinx-engage-outer var(--spinx-engage-duration) cubic-bezier(.2,.8,.2,1) both;
}

.spinx-symbol[data-motion='engage'] .spinx-symbol__orbit-spin--inner {
  animation: spinx-engage-inner var(--spinx-engage-duration) cubic-bezier(.2,.8,.2,1) both;
}

.spinx-symbol[data-motion='engage'] .spinx-symbol__ring-flow {
  animation: spinx-flow .62s linear 2;
}

.spinx-symbol[data-motion='engage'] .spinx-symbol__core {
  animation: spinx-core-flash var(--spinx-engage-duration) ease-out both;
}

/* SETTLE: returns to the aligned X moment. Useful after closing. */
.spinx-symbol[data-motion='settle'] .spinx-symbol__orbit-spin--outer {
  animation: spinx-settle-outer var(--spinx-settle-duration) cubic-bezier(.16,1,.3,1) both;
}

.spinx-symbol[data-motion='settle'] .spinx-symbol__orbit-spin--inner {
  animation: spinx-settle-inner var(--spinx-settle-duration) cubic-bezier(.16,1,.3,1) both;
}

.spinx-symbol[data-motion='settle'] .spinx-symbol__core {
  animation: spinx-core-pulse var(--spinx-core-duration) ease-in-out infinite;
}

/* STATIC: no motion. */
.spinx-symbol[data-motion='static'] .spinx-symbol__orbit-spin,
.spinx-symbol[data-motion='static'] .spinx-symbol__ring-flow,
.spinx-symbol[data-motion='static'] .spinx-symbol__core {
  animation: none;
}

@keyframes spinx-ring-cw {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}

@keyframes spinx-ring-ccw {
  from { transform: rotate(0deg); }
  to   { transform: rotate(-360deg); }
}

@keyframes spinx-idle-outer {
  0%, 100% { transform: rotate(0deg) scale(1); }
  35%      { transform: rotate(4deg) scale(1.006); }
  70%      { transform: rotate(-2deg) scale(.998); }
}

@keyframes spinx-idle-inner {
  0%, 100% { transform: rotate(0deg) scale(1); }
  35%      { transform: rotate(-4deg) scale(1.006); }
  70%      { transform: rotate(2deg) scale(.998); }
}

@keyframes spinx-flow {
  from { stroke-dashoffset: 0; opacity: .35; }
  50%  { opacity: .95; }
  to   { stroke-dashoffset: -356; opacity: .35; }
}

@keyframes spinx-core-pulse {
  0%, 100% { transform: scale(1); filter: saturate(1); opacity: .95; }
  45%      { transform: scale(1.07); filter: saturate(1.5); opacity: 1; }
}

@keyframes spinx-core-flash {
  0%   { transform: scale(.94); opacity: .86; }
  28%  { transform: scale(1.18); opacity: 1; }
  100% { transform: scale(1); opacity: .96; }
}

@keyframes spinx-engage-outer {
  0%   { transform: rotate(0deg) scale(1); }
  62%  { transform: rotate(142deg) scale(1.035); }
  100% { transform: rotate(180deg) scale(1); }
}

@keyframes spinx-engage-inner {
  0%   { transform: rotate(0deg) scale(1); }
  62%  { transform: rotate(-142deg) scale(1.035); }
  100% { transform: rotate(-180deg) scale(1); }
}

@keyframes spinx-settle-outer {
  0%   { transform: rotate(96deg) scale(1.018); }
  100% { transform: rotate(0deg) scale(1); }
}

@keyframes spinx-settle-inner {
  0%   { transform: rotate(-96deg) scale(1.018); }
  100% { transform: rotate(0deg) scale(1); }
}

@media (prefers-reduced-motion: reduce) {
  .spinx-symbol,
  .spinx-symbol * {
    animation: none !important;
    transition: none !important;
  }
}

  ]]></style>
  <defs>
  <linearGradient id="spinx-cyan-band" x1="80" y1="108" x2="426" y2="404" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="#d9feff"/>
    <stop offset="0.16" stop-color="#46efff"/>
    <stop offset="0.45" stop-color="#03bdd3"/>
    <stop offset="0.64" stop-color="#89fbff"/>
    <stop offset="1" stop-color="#12d8ef"/>
  </linearGradient>

  <linearGradient id="spinx-cyan-highlight" x1="122" y1="158" x2="389" y2="363" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="#ffffff" stop-opacity=".95"/>
    <stop offset=".38" stop-color="#91f8ff" stop-opacity=".9"/>
    <stop offset="1" stop-color="#00d7ec" stop-opacity=".7"/>
  </linearGradient>

  <linearGradient id="spinx-metal-band" x1="96" y1="398" x2="425" y2="112" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="#546469"/>
    <stop offset="0.18" stop-color="#dce9ec"/>
    <stop offset="0.33" stop-color="#798a90"/>
    <stop offset="0.52" stop-color="#111e22"/>
    <stop offset="0.76" stop-color="#eef6f8"/>
    <stop offset="1" stop-color="#8a989e"/>
  </linearGradient>

  <linearGradient id="spinx-metal-highlight" x1="120" y1="377" x2="402" y2="136" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="#ffffff" stop-opacity=".15"/>
    <stop offset=".36" stop-color="#ffffff" stop-opacity=".82"/>
    <stop offset=".56" stop-color="#ffffff" stop-opacity=".08"/>
    <stop offset="1" stop-color="#ffffff" stop-opacity=".72"/>
  </linearGradient>

  <radialGradient id="spinx-core-body" cx="50%" cy="42%" r="64%">
    <stop offset="0" stop-color="#536a72"/>
    <stop offset="0.42" stop-color="#15272d"/>
    <stop offset="1" stop-color="#071114"/>
  </radialGradient>

  <radialGradient id="spinx-core-light" cx="50%" cy="50%" r="56%">
    <stop offset="0" stop-color="#ffffff"/>
    <stop offset=".26" stop-color="#bfffff"/>
    <stop offset=".55" stop-color="#27e7ff" stop-opacity=".96"/>
    <stop offset="1" stop-color="#00c6de" stop-opacity="0"/>
  </radialGradient>

  <filter id="spinx-soft-shadow" x="-28%" y="-28%" width="156%" height="156%" color-interpolation-filters="sRGB">
    <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#071418" flood-opacity=".32"/>
  </filter>

  <filter id="spinx-neon" x="-35%" y="-35%" width="170%" height="170%" color-interpolation-filters="sRGB">
    <feGaussianBlur stdDeviation="5.6" result="blur"/>
    <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.00  0 0 0 0 0.85  0 0 0 0 1.00  0 0 0 .72 0" result="cyanBlur"/>
    <feMerge>
      <feMergeNode in="cyanBlur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>

  <filter id="spinx-core-glow" x="-70%" y="-70%" width="240%" height="240%" color-interpolation-filters="sRGB">
    <feGaussianBlur stdDeviation="9" result="glow"/>
    <feColorMatrix in="glow" type="matrix" values="0 0 0 0 0.00  0 0 0 0 0.82  0 0 0 0 1.00  0 0 0 .82 0" result="cyanGlow"/>
    <feMerge>
      <feMergeNode in="cyanGlow"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
</defs>

<g class="spinx-symbol__mark" fill="none">
  <!-- soft shared shadow; transparent canvas remains untouched -->
  <g opacity=".62" filter="url(#spinx-soft-shadow)">
    <ellipse cx="256" cy="256" rx="174" ry="70" transform="rotate(45 256 256)" stroke="#071418" stroke-width="29" stroke-linecap="round" opacity=".25"/>
    <ellipse cx="256" cy="256" rx="174" ry="70" transform="rotate(-45 256 256)" stroke="#071418" stroke-width="29" stroke-linecap="round" opacity=".18"/>
  </g>

  <!-- metallic / inner orbit -->
  <g class="spinx-symbol__orbit-spin spinx-symbol__orbit-spin--inner">
    <g transform="rotate(45 256 256)">
      <ellipse cx="256" cy="256" rx="174" ry="70" stroke="#091419" stroke-width="36" stroke-linecap="round" opacity=".82"/>
      <ellipse cx="256" cy="256" rx="174" ry="70" stroke="url(#spinx-metal-band)" stroke-width="26" stroke-linecap="round" filter="url(#spinx-soft-shadow)"/>
      <ellipse cx="256" cy="256" rx="174" ry="70" stroke="url(#spinx-metal-highlight)" stroke-width="8" stroke-linecap="round" opacity=".9"/>
      <ellipse class="spinx-symbol__ring-flow" cx="256" cy="256" rx="174" ry="70" stroke="#eefcff" stroke-width="4" stroke-linecap="round" opacity=".42"/>
    </g>
  </g>

  <!-- cyan / outer orbit -->
  <g class="spinx-symbol__orbit-spin spinx-symbol__orbit-spin--outer">
    <g transform="rotate(-45 256 256)">
      <ellipse cx="256" cy="256" rx="174" ry="70" stroke="#06252b" stroke-width="38" stroke-linecap="round" opacity=".82"/>
      <ellipse cx="256" cy="256" rx="174" ry="70" stroke="url(#spinx-cyan-band)" stroke-width="27" stroke-linecap="round" filter="url(#spinx-neon)"/>
      <ellipse cx="256" cy="256" rx="174" ry="70" stroke="url(#spinx-cyan-highlight)" stroke-width="8" stroke-linecap="round" opacity=".94"/>
      <ellipse class="spinx-symbol__ring-flow" cx="256" cy="256" rx="174" ry="70" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity=".52"/>
    </g>
  </g>

  <!-- focused center core -->
  <g class="spinx-symbol__core" filter="url(#spinx-core-glow)">
    <circle cx="256" cy="256" r="55" fill="url(#spinx-core-body)" stroke="#20363d" stroke-width="2" opacity=".98"/>
    <circle cx="256" cy="256" r="22" fill="url(#spinx-core-light)" opacity=".98"/>
    <circle cx="256" cy="256" r="10" fill="#eaffff" opacity=".96"/>
  </g>
</g>
</svg>
